<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lat/Lon Map · Color by Measure</title>
    <!-- Tableau Extensions API -->
    <script src="https://cdn.jsdelivr.net/gh/tableau/extensions-api/lib/tableau.extensions.1.latest.js"></script>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- D3 for color scales -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        #map { width: 100%; height: 100%; background: #e9ecef; }
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: white;
            font-weight: 500;
            gap: 12px;
            flex-direction: column;
            pointer-events: none;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .legend {
            position: absolute;
            bottom: 20px; right: 20px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(4px);
            padding: 8px 14px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #ddd;
            z-index: 1000;
            pointer-events: none;
        }
        .legend-gradient {
            width: 140px;
            height: 8px;
            background: linear-gradient(to right, #2c7bb6, #abd9e9, #ffffbf, #fdae61, #d7191c);
            border-radius: 4px;
            margin: 6px 0;
        }
        .legend-values {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #333;
        }
        .empty-state {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px 28px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            z-index: 1500;
            font-size: 13px;
            max-width: 280px;
        }
        .tooltip-custom {
            font-weight: 600;
            background: rgba(0,0,0,0.8);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div id="map"></div>
<div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="spinner"></div>
    <div>Loading map data...</div>
</div>
<div id="legend" class="legend" style="display: none;">
    <div>📊 Color by Measure</div>
    <div class="legend-gradient"></div>
    <div class="legend-values">
        <span id="legendMin">—</span>
        <span id="legendMax">—</span>
    </div>
</div>

<script>
    (function() {
        let map = null;
        let markerLayer = null;
        let worksheet = null;
        let resizeObserver = null;

        // Initialize Leaflet map
        function initMap() {
            if (map) map.remove();
            map = L.map('map').setView([39.8283, -98.5795], 4);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
                subdomains: 'abcd',
                maxZoom: 18
            }).addTo(map);
            markerLayer = L.layerGroup().addTo(map);
        }

        // Format numbers for legend and tooltips
        function formatNumber(n) {
            if (n === null || isNaN(n)) return '—';
            const abs = Math.abs(n);
            if (abs >= 1e9) return (n / 1e9).toFixed(1) + 'B';
            if (abs >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            if (abs >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return n.toFixed(2);
        }

        // Main rendering: read data, plot circles with color scale
        async function renderMap() {
            if (!worksheet) return;
            const loadingDiv = document.getElementById('loadingOverlay');
            const legendDiv = document.getElementById('legend');
            loadingDiv.style.display = 'flex';
            legendDiv.style.display = 'none';

            try {
                // Get data and encodings
                const rows = await getTableauData(worksheet);
                const enc = await getEncodings(worksheet);

                const latField = enc.latitude?.name;
                const lonField = enc.longitude?.name;
                const measureField = enc.measure?.name;
                const labelField = enc.label?.name;  // optional, for tooltip

                if (!latField || !lonField || !measureField) {
                    showEmptyState("Please assign:\n• Latitude (numeric)\n• Longitude (numeric)\n• Measure (numeric)");
                    return;
                }

                // Extract points
                const points = [];
                const measures = [];
                for (const row of rows) {
                    let lat = parseFloat(row[latField]?.nativeValue ?? row[latField]?.value);
                    let lon = parseFloat(row[lonField]?.nativeValue ?? row[lonField]?.value);
                    let measure = parseFloat(row[measureField]?.nativeValue ?? row[measureField]?.value);
                    let label = labelField ? (row[labelField]?.formattedValue || row[labelField]?.value || '') : '';
                    if (!isNaN(lat) && !isNaN(lon) && !isNaN(measure)) {
                        points.push({ lat, lon, measure, label });
                        measures.push(measure);
                    }
                }

                if (points.length === 0) {
                    showEmptyState("No valid points found. Check that Latitude/Longitude are numeric and Measure is not null.");
                    return;
                }

                // Color scale (sequential, handles positive/negative)
                const minVal = Math.min(...measures);
                const maxVal = Math.max(...measures);
                let colorScale;
                if (minVal >= 0) {
                    colorScale = d3.scaleSequentialLog()
                        .domain([Math.max(0.01, minVal), maxVal])
                        .interpolator(d3.interpolateYlOrRd);
                } else {
                    // Diverging for negative values
                    const absMax = Math.max(Math.abs(minVal), Math.abs(maxVal));
                    colorScale = d3.scaleSequentialLog()
                        .domain([-absMax, absMax])
                        .interpolator(d3.interpolateRdBu);
                }

                // Initialize map if needed
                if (!map) initMap();
                else markerLayer.clearLayers();

                // Draw circles
                for (const p of points) {
                    const radius = Math.max(6, Math.min(24, 6 + (p.measure - minVal) / (maxVal - minVal) * 18));
                    const color = colorScale(p.measure);
                    const circle = L.circleMarker([p.lat, p.lon], {
                        radius: radius,
                        fillColor: color,
                        color: '#ffffff',
                        weight: 1.2,
                        opacity: 0.9,
                        fillOpacity: 0.75
                    }).addTo(markerLayer);

                    const tooltipContent = p.label 
                        ? `<strong>${p.label}</strong><br>${formatNumber(p.measure)}`
                        : `<strong>${formatNumber(p.measure)}</strong>`;
                    circle.bindTooltip(tooltipContent, {
                        permanent: false,
                        direction: 'top',
                        className: 'tooltip-custom'
                    });
                }

                // Fit map bounds to points
                const bounds = markerLayer.getBounds();
                if (bounds.isValid()) map.fitBounds(bounds, { padding: [30, 30] });

                // Update legend
                document.getElementById('legendMin').innerText = formatNumber(minVal);
                document.getElementById('legendMax').innerText = formatNumber(maxVal);
                legendDiv.style.display = 'block';
                hideEmptyState();

            } catch (err) {
                console.error(err);
                showEmptyState("Error loading data: " + err.message);
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        // Tableau data helpers
        async function getTableauData(worksheetObj) {
            let allRows = [];
            const reader = await worksheetObj.getSummaryDataReaderAsync(undefined, { ignoreSelection: true });
            for (let i = 0; i < reader.pageCount; i++) {
                const page = await reader.getPageAsync(i);
                page.data.forEach(row => {
                    const obj = {};
                    page.columns.forEach((col, idx) => { obj[col.fieldName] = row[idx]; });
                    allRows.push(obj);
                });
            }
            await reader.releaseAsync();
            return allRows;
        }

        async function getEncodings(worksheetObj) {
            const spec = await worksheetObj.getVisualSpecificationAsync();
            const encMap = {};
            if (spec.activeMarksSpecificationIndex < 0) return encMap;
            const marks = spec.marksSpecifications[spec.activeMarksSpecificationIndex];
            marks.encodings.forEach(enc => { encMap[enc.id] = enc.field; });
            return encMap;
        }

        // UI state helpers
        let emptyDiv = null;
        function showEmptyState(message) {
            if (emptyDiv) emptyDiv.remove();
            emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-state';
            emptyDiv.innerHTML = `<strong>⚠️ Incomplete configuration</strong><br>${message.replace(/\n/g, '<br>')}`;
            document.body.appendChild(emptyDiv);
            if (markerLayer) markerLayer.clearLayers();
            document.getElementById('legend').style.display = 'none';
        }
        function hideEmptyState() {
            if (emptyDiv) emptyDiv.remove();
            emptyDiv = null;
        }

        // Extension initialization
        async function init() {
            try {
                await tableau.extensions.initializeAsync();
                worksheet = tableau.extensions.worksheetContent.worksheet;
                initMap();
                await renderMap();
                // Listen for data changes
                worksheet.addEventListener(tableau.TableauEventType.SummaryDataChanged, renderMap);
                // Optional: listen for resize
                if (window.ResizeObserver) {
                    resizeObserver = new ResizeObserver(() => { if (map) map.invalidateSize(); });
                    resizeObserver.observe(document.getElementById('map'));
                }
            } catch (err) {
                console.error(err);
                showEmptyState("Extension failed to initialize.");
            }
        }

        init();
    })();
</script>
</body>
</html>
